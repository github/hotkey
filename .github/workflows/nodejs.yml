name: Node CI

permissions:
  contents: read

on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - name: npm install, build, and test
        run: |
          npm install
          npm run build
          npx playwright install chromium
          npm test
        env:
          CI: true
